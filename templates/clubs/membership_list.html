{% extends 'base.html' %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h1>Memberships</h1><a class="btn btn-primary" href="{% url 'membership_add' %}">Enroll Student</a></div>
<form class="row g-2 mb-3"><div class="col-md-4"><select name="club" class="form-select"><option value="">All Clubs</option>{% for club in clubs %}<option value="{{ club.pk }}" {% if selected_club == club.pk|stringformat:'s' %}selected{% endif %}>{{ club.name }}</option>{% endfor %}</select></div><div class="col-auto"><button class="btn btn-outline-primary">Filter</button></div></form>
{% include 'clubs/partials_membership_table.html' with memberships=memberships compact=False %}
{% endblock %}
