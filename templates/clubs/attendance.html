{% extends 'base.html' %}{% block content %}
<h1>Attendance: {{ event.title }}</h1>
<p class="text-muted">Check in students after the event.</p>
<form method="post">{% csrf_token %}<div class="list-group mb-3">{% for rsvp in attendees %}<label class="list-group-item"><input class="form-check-input me-2" type="checkbox" name="attended" value="{{ rsvp.user.pk }}" {% if rsvp.user.pk in checked %}checked{% endif %}>{{ rsvp.user.get_full_name|default:rsvp.user.email }} — {{ rsvp.user.email }}</label>{% empty %}<p>No confirmed attendees.</p>{% endfor %}</div><button class="btn btn-primary">Save Attendance</button></form>
{% endblock %}
