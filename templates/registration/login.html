{% extends 'base.html' %}{% block title %}Login · GU Club Tracker{% endblock %}{% block content %}
<div class="auth-card mx-auto">
  <h1 class="h3 mb-3">Login</h1>
  <form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary w-100">Login</button></form>
  <p class="mt-3 mb-0">Need an account? <a href="{% url 'signup' %}">Sign up with your Gonzaga email</a>.</p>
</div>
{% endblock %}
